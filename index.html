<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everlasting Mines</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="game-container">
    <div class="header">
        <h1>Everlasting Mines v1.2</h1>
        <p id="total-mined-display" class="stats">Total Mined: 0</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-target="mine">Main</button>
        <button class="tab-btn" data-target="shop">Shop</button>
        <button class="tab-btn" data-target="encyclopedia">Encyclopedia</button>
    </div>

    <div id="mine" class="section active">
        <div class="action-bar">
            <button class="main-btn" onclick="onMineButtonClick()">MINE IT!</button>
            <button class="sub-btn" onclick="resetGame()">Reset</button>
        </div>
        <button id="autoMineBtn" class="mining-btn">Auto Mining OFF</button>

    <div id="active-effects-box" style="display: none; padding: 10px; border: 1px solid #333; margin-top: 10px;">
        <strong>Active Effects</strong>
            <div id="effects-list">
        </div>
    </div>
        
        <div class="card result-card">
            <div id="result">Let Your Dream Come True.</div>
            <div id="notification-area"></div>
        </div>
        
        <div id="active-effects-box" class="card" style="display: none;">
            <h3>Active Effects</h3>
            <div id="effects-list"></div>
        </div>

        <h2>Inventory</h2> 
        <div id="inventory" class="card"></div>
        
        <div id="layer-control" class="card layer-card">
            <button onclick="moveLayer(-1)">◀</button>
            <span id="layer-display">Surface</span>
            <button onclick="moveLayer(1)">▶</button>
        </div>

        <div class="card debug-card">
            <h3 class="debug-title">🛠️ Debug Tool</h3>
            <div class="debug-row">
                <input type="text" id="debug-input" placeholder="Ore's Name (Copy and Paste!)">
                <button class="debug-btn" onclick="forceMine()">Force</button>
            </div>
        </div>
    </div>

<div id="shop" class="section">
        <h2>Blacksmith & Shop</h2>
        <div class="card">
            <p id="coin-display">💰 Coins: 0</p>
            <button class="btn-danger" onclick="sellAllOres()" style="width: 100%; padding: 10px;">SELL ALL ORES</button>
        </div>
        
        <div class="sub-tabs" style="display: flex; gap: 5px; margin-bottom: 15px;">
            <button class="sub-tab-btn active" onclick="switchShopTab('alchemist', event)" style="flex: 1; padding: 10px;">🧪 Alchemist</button>
            <button class="sub-tab-btn" onclick="switchShopTab('blacksmith', event)" style="flex: 1; padding: 10px;">⚒️ Blacksmith</button>
        </div>

        <div id="alchemist-section" class="sub-section active">
            <div id="potion-list" style="display: flex; gap: 15px; flex-wrap: wrap;">
                <div class="potion-card">...</div>
            </div>
        </div>

        <div id="blacksmith-section" class="sub-section" style="display: none;">

            <div id="pickaxe-section">

                <h2>Pickaxes</h2>

                <div id="pickaxe-ui-list"></div>

            </div>

            <div id="forge-list-container" class="card">

                <h3>Forge Recipes</h3>

                <div id="recipe-list"></div>

            </div>

        </div>

    </div> <div id="encyclopedia" class="section">
        <h2>Ore Encyclopedia</h2>
        <div id="encyclopedia-content"></div> 
    </div>

<script src="debug.js" defer></script>
<script src="pickaxe.js" defer></script>
<script src="script.js" defer></script>
</body>
</html>
